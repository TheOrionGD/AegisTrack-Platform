<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisTrack Core — Owner Access Portal</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/tracking-request.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        referrerpolicy="no-referrer" />
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            width: 100%;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-header i {
            font-size: 40px;
            color: var(--accent-secondary);
            margin-bottom: 12px;
        }

        .brand-header h2 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text);
            text-transform: uppercase;
        }

        .brand-header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }
    </style>
</head>

<body class="theme-shell">
    <div class="page-shell" style="max-width: 600px; justify-content: center;">
        <div class="login-container">
            <section class="panel login-card">
                <div class="panel-body" style="padding: 30px 24px;">
                    <div class="brand-header">
                        <i class="fa-solid fa-shield-halved"></i>
                        <h2>AegisTrack</h2>
                        <p>Owner Access Portal</p>
                    </div>

                    <form id="ownerLoginForm" style="display: flex; flex-direction: column; gap: 16px;">
                        <div class="floating-field">
                            <input id="ownerEmail" type="email" placeholder=" " required autocomplete="username">
                            <label for="ownerEmail">Owner Email Address</label>
                        </div>
                        <div class="floating-field">
                            <input id="ownerPassword" type="password" placeholder=" " required autocomplete="current-password">
                            <label for="ownerPassword">Access Password</label>
                        </div>

                        <button type="submit" id="loginBtn" class="btn-primary" style="height: 48px; font-size: 15px; margin-top: 10px;">
                            <i class="fa-solid fa-right-to-bracket"></i> Login to Live Tracker
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../js/config.js"></script>
    <script src="../js/owner-login.js"></script>
</body>

</html>
