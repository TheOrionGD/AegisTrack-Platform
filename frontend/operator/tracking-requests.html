<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisTrack — Tracking Requests</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../assets/css/operator-portal.css">
    <link rel="stylesheet" href="../css/tracking-request.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer">
</head>
<body>
<div class="op-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
        <header class="topbar" id="topbar"></header>
        <main class="main-content">
            <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);">
                <div>
                    <h1>Tracking Requests</h1>
                    <p class="page-subtitle">Generate secure consent links and manage active tracking requests</p>
                </div>
                <button class="btn btn-primary" id="newRequestBtn">
                    <i class="fa-solid fa-plus"></i> New Request
                </button>
            </div>

            <!-- Two-column layout: Form + Active Requests -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);" id="reqLayout">
                <!-- Left: Form -->
                <div id="formSide">
                    <div class="section-card">
                        <div class="section-card-header">
                            <h3><i class="fa-solid fa-paper-plane"></i> Create New Request</h3>
                        </div>
                        <div class="section-card-body">
                            <!-- Stepper -->
                            <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-5);" id="stepper">
                                <div class="step-pill active" id="sp1" style="display:flex;align-items:center;gap:var(--space-2);padding:4px 12px;border-radius:var(--radius-full);background:var(--accent-green-dim);border:1px solid rgba(0,255,136,0.3);font-size:var(--text-xs);font-weight:700;color:var(--accent-green);">
                                    <span>1</span> Details
                                </div>
                                <div style="flex:1;height:1px;background:var(--border-soft);"></div>
                                <div class="step-pill" id="sp2" style="display:flex;align-items:center;gap:var(--space-2);padding:4px 12px;border-radius:var(--radius-full);background:var(--bg-elevated);border:1px solid var(--border-soft);font-size:var(--text-xs);font-weight:700;color:var(--text-muted);">
                                    <span>2</span> Review
                                </div>
                                <div style="flex:1;height:1px;background:var(--border-soft);"></div>
                                <div class="step-pill" id="sp3" style="display:flex;align-items:center;gap:var(--space-2);padding:4px 12px;border-radius:var(--radius-full);background:var(--bg-elevated);border:1px solid var(--border-soft);font-size:var(--text-xs);font-weight:700;color:var(--text-muted);">
                                    <span>3</span> Deliver
                                </div>
                            </div>

                            <!-- Step 1: Form -->
                            <div id="step1">
                                <form id="trackingForm" style="display:flex;flex-direction:column;gap:var(--space-4);">
                                    <div class="form-group">
                                        <label class="form-label">Device Owner Name *</label>
                                        <div class="form-input-icon-wrapper">
                                            <i class="fa-solid fa-user input-icon"></i>
                                            <input class="form-input" id="ownerName" type="text" placeholder="Full name of device owner" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Mobile Number *</label>
                                        <div class="form-input-icon-wrapper">
                                            <i class="fa-solid fa-phone input-icon"></i>
                                            <input class="form-input" id="phoneNumber" type="tel" placeholder="+91xxxxxxxxxx" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Organisation Name *</label>
                                        <input class="form-input" id="orgName" type="text" placeholder="Your organisation" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Tracking Purpose *</label>
                                        <input class="form-input" id="trackingPurpose" type="text" placeholder="e.g. Asset protection" required>
                                    </div>
                                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
                                        <div class="form-group">
                                            <label class="form-label">Duration *</label>
                                            <input class="form-input" id="trackingDuration" type="text" placeholder="e.g. 30 days" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Consent Expiry *</label>
                                            <input class="form-input" id="consentExpiry" type="date" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Notification Email</label>
                                        <input class="form-input" id="notifyEmail" type="email" placeholder="name@example.com">
                                    </div>
                                    <div style="display:flex;gap:var(--space-3);justify-content:flex-end;">
                                        <button type="button" class="btn btn-secondary" id="previewBtn">
                                            <i class="fa-solid fa-eye"></i> Preview
                                        </button>
                                        <button type="button" class="btn btn-primary" id="createBtn">
                                            <i class="fa-solid fa-paper-plane"></i> Create & Generate Link
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <!-- Step 2: Review -->
                            <div id="step2" class="hidden">
                                <div id="reviewCard" style="background:var(--bg-base);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:var(--space-5);margin-bottom:var(--space-4);font-size:var(--text-sm);"></div>
                                <div style="display:flex;gap:var(--space-3);justify-content:flex-end;">
                                    <button class="btn btn-secondary" id="backBtn"><i class="fa-solid fa-arrow-left"></i> Back</button>
                                    <button class="btn btn-primary" id="sendBtn"><i class="fa-solid fa-check"></i> Confirm & Generate</button>
                                </div>
                            </div>

                            <!-- Step 3: Delivery -->
                            <div id="step3" class="hidden">
                                <div style="background:var(--accent-green-dim);border:1px solid rgba(0,255,136,0.2);border-radius:var(--radius-lg);padding:var(--space-5);margin-bottom:var(--space-4);text-align:center;">
                                    <i class="fa-solid fa-check-circle" style="font-size:36px;color:var(--accent-green);display:block;margin-bottom:var(--space-3);"></i>
                                    <div style="font-weight:700;font-size:var(--text-lg);margin-bottom:var(--space-2);">Consent Link Generated!</div>
                                    <p style="font-size:var(--text-sm);color:var(--text-secondary);">Share this secure link with the device owner.</p>
                                </div>

                                <div style="background:var(--bg-base);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-4);">
                                    <div style="font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:var(--space-2);">Registration Link</div>
                                    <div style="display:flex;align-items:center;gap:var(--space-2);">
                                        <code id="generatedLink" style="flex:1;background:var(--bg-surface);border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-xs);color:var(--accent-cyan);word-break:break-all;"></code>
                                        <button class="btn btn-secondary btn-icon btn-icon-sm" id="copyLinkBtn" title="Copy link"><i class="fa-solid fa-copy"></i></button>
                                    </div>
                                </div>

                                <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-4);">
                                    <button class="btn btn-sm" id="whatsappBtn" style="background:#25D366;color:white;flex:1;">
                                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                                    </button>
                                    <button class="btn btn-secondary btn-sm" id="emailBtn" style="flex:1;">
                                        <i class="fa-solid fa-envelope"></i> Email
                                    </button>
                                </div>

                                <div style="text-align:center;margin-bottom:var(--space-4);">
                                    <div id="qrContainer"></div>
                                </div>

                                <button class="btn btn-secondary btn-full" id="newAgainBtn">
                                    <i class="fa-solid fa-plus"></i> Create Another Request
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Active Requests Table -->
                <div id="requestsListSide">
                    <div class="section-card">
                        <div class="section-card-header">
                            <h3><i class="fa-solid fa-list-check"></i> Active Requests</h3>
                            <button class="btn btn-ghost btn-sm btn-icon" id="refreshListBtn" title="Refresh"><i class="fa-solid fa-rotate-right"></i></button>
                        </div>
                        <div style="padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-soft);">
                            <div class="search-bar">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" placeholder="Search requests…" id="reqSearch">
                            </div>
                        </div>
                        <div style="overflow-x:auto;">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Owner</th>
                                        <th>Mobile</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="requestsTableBody">
                                    <tr><td colspan="5" style="text-align:center;padding:var(--space-8);color:var(--text-muted);">Loading requests…</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth-interceptor.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ws.js"></script>
<script src="../assets/js/operator-portal.js"></script>
<script src="../js/tracking-request.js" defer></script>
<script>
(async () => {
    await initOperatorPortal('Tracking Requests');

    // Set default expiry to 7 days from now
    const expiryInput = document.getElementById('consentExpiry');
    if (expiryInput) {
        const d = new Date(); d.setDate(d.getDate() + 7);
        expiryInput.value = d.toISOString().split('T')[0];
    }

    let currentStep = 1;
    let generatedToken = null;
    let formData = {};

    function showStep(n) {
        currentStep = n;
        ['step1','step2','step3'].forEach((id, i) => {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden', i + 1 !== n);
        });
        ['sp1','sp2','sp3'].forEach((id, i) => {
            const el = document.getElementById(id);
            if (!el) return;
            if (i + 1 < n) {
                el.style.background = 'var(--accent-green-dim)';
                el.style.borderColor = 'rgba(0,255,136,0.3)';
                el.style.color = 'var(--accent-green)';
            } else if (i + 1 === n) {
                el.style.background = 'var(--accent-cyan-dim)';
                el.style.borderColor = 'rgba(0,194,255,0.3)';
                el.style.color = 'var(--accent-cyan)';
            } else {
                el.style.background = 'var(--bg-elevated)';
                el.style.borderColor = 'var(--border-soft)';
                el.style.color = 'var(--text-muted)';
            }
        });
    }

    document.getElementById('previewBtn')?.addEventListener('click', () => {
        formData = {
            owner_name: document.getElementById('ownerName').value.trim(),
            phone_number: document.getElementById('phoneNumber').value.trim(),
            organization_name: document.getElementById('orgName').value.trim(),
            tracking_purpose: document.getElementById('trackingPurpose').value.trim(),
            tracking_duration: document.getElementById('trackingDuration').value.trim(),
            consent_expiry: document.getElementById('consentExpiry').value,
            notify_email: document.getElementById('notifyEmail').value.trim(),
        };
        if (!formData.owner_name || !formData.phone_number) {
            showToast('Please fill required fields', 'warning');
            return;
        }
        const card = document.getElementById('reviewCard');
        card.innerHTML = Object.entries(formData).filter(([,v]) => v).map(([k,v]) =>
            `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm);">
                <span style="color:var(--text-secondary);">${k.replace(/_/g,' ')}</span>
                <strong style="color:var(--text-primary);">${v}</strong>
            </div>`
        ).join('');
        showStep(2);
    });

    document.getElementById('backBtn')?.addEventListener('click', () => showStep(1));

    document.getElementById('createBtn')?.addEventListener('click', () => {
        document.getElementById('previewBtn').click();
    });

    document.getElementById('sendBtn')?.addEventListener('click', async () => {
        const btn = document.getElementById('sendBtn');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Creating…';
        btn.disabled = true;
        try {
            const res = await AegisAPI.tracking.create(formData);
            generatedToken = res.token || res.tracking_request?.token;
            const frontendBase = window.location.origin;
            const regLink = `${frontendBase}/enrollment/device-registration.html?token=${generatedToken}`;
            document.getElementById('generatedLink').textContent = regLink;

            // QR Code
            const qrEl = document.getElementById('qrContainer');
            qrEl.innerHTML = '';
            if (window.QRCode) {
                new QRCode(qrEl, { text: regLink, width: 160, height: 160, colorDark: '#00ff88', colorLight: '#090f16' });
            }

            // WhatsApp
            const wa = document.getElementById('whatsappBtn');
            if (wa && formData.phone_number) {
                const msg = encodeURIComponent(`AegisTrack Consent Request\nHello ${formData.owner_name},\nPlease register your device: ${regLink}`);
                wa.onclick = () => window.open(`https://wa.me/${formData.phone_number.replace(/\D/g,'')}?text=${msg}`, '_blank');
            }

            document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(regLink).then(() => showToast('Link copied!', 'success'));
            });

            showStep(3);
            loadRequests();
        } catch(e) {
            showToast(AegisAPI.formatError(e), 'danger');
        } finally {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Confirm & Generate';
            btn.disabled = false;
        }
    });

    document.getElementById('newAgainBtn')?.addEventListener('click', () => {
        document.getElementById('trackingForm').reset();
        const d = new Date(); d.setDate(d.getDate() + 7);
        document.getElementById('consentExpiry').value = d.toISOString().split('T')[0];
        showStep(1);
    });

    // Load existing requests
    async function loadRequests() {
        const tbody = document.getElementById('requestsTableBody');
        if (!tbody) return;
        try {
            const data = await AegisAPI.tracking.list();
            const reqs = data.requests || data.tracking_requests || [];
            if (!reqs.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:var(--space-8);color:var(--text-muted);">No tracking requests yet</td></tr>';
                return;
            }

            const statusColors = { TRACKING_ACTIVE: 'badge-green', LINK_GENERATED: 'badge-cyan', PENDING: 'badge-warning', EXPIRED: 'badge-muted', REVOKED: 'badge-danger', PAUSED: 'badge-warning' };
            tbody.innerHTML = reqs.map(r => `
                <tr>
                    <td style="font-weight:500;">${r.owner_name || '—'}</td>
                    <td style="color:var(--text-secondary);font-size:var(--text-xs);">${r.phone_number || '—'}</td>
                    <td><span class="badge ${statusColors[r.status] || 'badge-muted'}">${r.status || 'UNKNOWN'}</span></td>
                    <td style="color:var(--text-muted);font-size:var(--text-xs);">${r.created_at ? new Date(r.created_at).toLocaleDateString() : '—'}</td>
                    <td>
                        <div style="display:flex;gap:var(--space-1);">
                            <button class="btn btn-ghost btn-icon btn-icon-sm" title="Copy link" onclick="copyReqLink('${r.token}')"><i class="fa-solid fa-copy"></i></button>
                            <button class="btn btn-ghost btn-icon btn-icon-sm" title="Revoke" onclick="revokeReq('${r.token}')" style="color:var(--color-danger);"><i class="fa-solid fa-ban"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:var(--space-6);color:var(--text-muted);">Unable to load requests</td></tr>`;
        }
    }

    window.copyReqLink = async (token) => {
        const link = `${window.location.origin}/enrollment/device-registration.html?token=${token}`;
        await navigator.clipboard.writeText(link);
        showToast('Link copied!', 'success');
    };

    window.revokeReq = async (token) => {
        if (!confirm('Revoke this tracking request?')) return;
        try {
            await AegisAPI.tracking.revoke(token);
            showToast('Request revoked', 'success');
            loadRequests();
        } catch(e) { showToast(AegisAPI.formatError(e), 'danger'); }
    };

    document.getElementById('refreshListBtn')?.addEventListener('click', loadRequests);

    // Search filter
    document.getElementById('reqSearch')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('#requestsTableBody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });

    loadRequests();

    // WS refresh
    AegisWS.on('status_updated', () => { setTimeout(loadRequests, 500); });

    // Responsive: stack on mobile
    if (window.innerWidth < 768) {
        const layout = document.getElementById('reqLayout');
        if (layout) layout.style.gridTemplateColumns = '1fr';
    }
})();
</script>
</body>
</html>
